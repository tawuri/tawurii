<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ⵜⴰⵡⵓⵔⵉ — TAWURI | Artisanat Marocain Authentique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#f5f0e8;--dark:#0d1f17;--forest:#1a3a2a;--forest-m:#245038;--forest-l:#2f6847;--sage:#4a8c5c;--mint:#7ab893;--gold:#c9a84c;--gold-l:#e8c96a;--text:#f0ebe0;--muted:#a8c4b0;--red:#f87171;--border:#2f6847;--white:#ffffff;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.18);--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Lato','Helvetica',sans-serif;background:var(--cream);color:#1a1a1a;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
h1,h2,h3,h4,.font-title{font-family:'Playfair Display','Georgia',serif}
.geometric-line{height:2px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 10px,transparent 10px,transparent 18px);margin:16px 0;opacity:.6}
nav{background:linear-gradient(90deg,var(--forest) 0%,#1a3a2a 100%);padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;min-height:72px;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
nav .logo{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
nav .logo .tifinagh{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);font-weight:bold;text-shadow:0 0 15px rgba(201,168,76,0.6);transition:var(--transition)}
nav .logo:hover .tifinagh{transform:scale(1.05)}
nav .logo .brand{font-family:'Playfair Display',serif;color:var(--cream);font-size:.9rem;letter-spacing:4px}
nav .nav-links{display:flex;gap:4px;flex-wrap:wrap}
nav .nav-links button{background:transparent;color:var(--muted);border:none;padding:8px 12px;cursor:pointer;font-size:.8rem;border-radius:24px;transition:var(--transition);font-family:'Lato',sans-serif;font-weight:600;letter-spacing:.5px;position:relative}
nav .nav-links button::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:var(--gold);transition:.3s;transform:translateX(-50%)}
nav .nav-links button:hover{background:rgba(255,255,255,0.1);color:var(--gold)}
nav .nav-links button:hover::after{width:60%}
nav .nav-links button.active{background:var(--forest-m);color:var(--gold);font-weight:bold}
nav .auth-area{display:flex;gap:8px;align-items:center}
nav .auth-area button{background:var(--forest-l);color:var(--cream);border:none;padding:8px 16px;cursor:pointer;border-radius:24px;font-size:.8rem;font-weight:600;transition:var(--transition);font-family:'Lato',sans-serif}
nav .auth-area button:hover{background:var(--gold);color:var(--dark)}
.page{display:none;animation:fadeSlideIn .45s ease}
.page.active{display:block}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card{background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin:12px 0;border:1px solid rgba(201,168,76,0.25);transition:all .4s ease;position:relative;overflow:hidden}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,0.22);border-color:var(--gold-l)}
.card-dark{background:rgba(13,31,23,0.96);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:12px 0}
.card-gold{background:linear-gradient(135deg,#fdf8ed,#faf3e0);border:2px solid var(--gold-l);border-radius:var(--radius);padding:24px;margin:12px 0}
.btn{display:inline-block;padding:11px 22px;border-radius:30px;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:.87rem;font-weight:700;transition:all .3s ease;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 3px 8px rgba(0,0,0,0.1)}
.btn-primary{background:var(--forest-l);color:var(--cream)}.btn-primary:hover{background:var(--sage);transform:translateY(-2px)}
.btn-gold{background:var(--gold);color:var(--dark)}.btn-gold:hover{background:var(--gold-l);transform:translateY(-2px)}
.btn-outline{background:transparent;border:2px solid var(--forest-l);color:var(--forest)}.btn-outline:hover{background:var(--forest-l);color:var(--cream)}
.btn-sm{padding:7px 16px;font-size:.78rem}
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{padding:14px 22px;border-radius:28px;font-size:.88rem;box-shadow:var(--shadow);animation:toastIn .45s ease,toastOut .4s ease 2.8s forwards;font-weight:600;max-width:320px}
.toast.success{background:var(--forest-m);color:var(--cream)}
.toast.error{background:#5c1a1a;color:#fca5a5}
.toast.info{background:#1a3a5c;color:#bfdbfe}
@keyframes toastIn{from{opacity:0;transform:translateX(70px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-20px)}}
input,select,textarea{width:100%;padding:11px 13px;border:2px solid #d5cbb8;border-radius:var(--radius);font-family:inherit;font-size:.93rem;background:var(--white);transition:var(--transition);color:#1a1a1a}
input:focus,select:focus,textarea:focus{border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(201,168,76,0.2)}
label{display:block;font-weight:600;margin-bottom:4px;color:var(--forest);font-size:.84rem}
.form-group{margin-bottom:13px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.guide-nav-btn{display:block;width:100%;text-align:left;padding:13px 20px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:'Lato',sans-serif;font-size:.9rem;transition:.2s;border-left:3px solid transparent}
.guide-nav-btn:hover,.guide-nav-btn.active{background:var(--forest-m);color:var(--gold);border-left-color:var(--gold)}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="navigate('accueil')">
    <span class="tifinagh">ⵜⴰⵡⵓⵔⵉ</span><span class="brand">TAWURI</span>
  </div>
  <div class="nav-links" id="nav-links"></div>
  <div class="auth-area" id="auth-area"><button onclick="navigate('inscription')">S'inscrire</button></div>
</nav>
<main id="main-content"></main>
<div id="toast-container"></div>

<script>
// ═══════════════════════════
// GUIDE DATA
// ═══════════════════════════
const ARTISANAT_LABELS = {
  poterie:'🏺 Poterie',tissage:'🪡 Tissage / Tapis',bijoux:'🪙 Bijouterie',bois:'🪵 Bois sculpté',
  maroquinerie:'🎨 Maroquinerie',zellige:'🪔 Zellige'
};
const GUIDE_CONTENT = {
  poterie:{emoji:"🏺",nom:"La Poterie Marocaine",couleur:"#8B4513",couleur2:"#D2691E",
    histoire:"La poterie marocaine est l'une des formes d'artisanat les plus anciennes du Maroc...",
    techniques:"L'argile rouge de Safi...",
    symbolisme:"Le losange (tafout) symbolise le soleil...",
    conservation:"Nettoyage : eau tiède + savon neutre..."
  },
  tissage:{emoji:"🪡",nom:"Le Tissage Marocain",couleur:"#722F37",couleur2:"#C84B31",
    histoire:"Le tissage est pratiqué depuis plus de 4 000 ans...",
    techniques:"La laine de mouton (taghatt)...",
    symbolisme:"Le losange central (tafout)...",
    conservation:"Aspirez dans le sens du poil..."
  },
  bijoux:{emoji:"🪙",nom:"La Bijouterie Marocaine",couleur:"#1a3a5c",couleur2:"#2e6da4",
    histoire:"La bijouterie marocaine couvre plus de trois millénaires...",
    techniques:"L'argent 999/1000 est travaillé par ciselure...",
    symbolisme:"La fibule (tizerzaï)...",
    conservation:"Argent : nettoyez au bicarbonate..."
  },
  bois:{emoji:"🪵",nom:"Le Bois Sculpté",couleur:"#3B2314",couleur2:"#7B5E3B",
    histoire:"La mosquée Qarawiyyin de Fès...",
    techniques:"Le thuya d'Essaouira...",
    symbolisme:"L'étoile à 8 branches...",
    conservation:"Thuya : cire d'abeille naturelle..."
  },
  maroquinerie:{emoji:"🎨",nom:"La Maroquinerie Marocaine",couleur:"#3B1F0A",couleur2:"#8B4513",
    histoire:"La tannerie Chouara de Fès...",
    techniques:"Le tannage végétal de Fès...",
    symbolisme:"Le jaune safran de la babouche...",
    conservation:"Nettoyage avec un chiffon légèrement humide..."
  },
  zellige:{emoji:"🪔",nom:"Le Zellige Marocain",couleur:"#0d4f3c",couleur2:"#1a8a6e",
    histoire:"Né en Andalousie...",
    techniques:"L'argile blanche calcaire de Fès...",
    symbolisme:"L'entrelacs infini...",
    conservation:"Nettoyage : eau chaude + savon neutre..."
  }
};
const VILLES = ['Marrakech','Fès','Rabat','Agadir','Ouarzazate','Tiznit','Essaouira','Casablanca'];
const SPECIALITES = Object.values(ARTISANAT_LABELS);

// ═══════════════════════════
// UTILS
// ═══════════════════════════
function showToast(msg, type='success'){
  const c = document.getElementById('toast-container');
  const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t); setTimeout(()=>t.remove(), 3400);
}
function esc(s){ const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

// ═══════════════════════════
// NAVIGATION
// ═══════════════════════════
window.navigate = function(page){
  document.querySelectorAll('.nav-links button').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  const main = document.getElementById('main-content'); main.innerHTML = '';
  const div = document.createElement('div'); div.className = 'page active';
  if(page==='accueil') renderAccueil(div);
  else if(page==='explorer') renderExplorerPage(div);
  else if(page==='guide') renderGuidePage(div);
  else if(page==='inscription') renderInscriptionPage(div);
  main.appendChild(div);
  window.scrollTo({top:0,behavior:'smooth'});
};
function updateNav(){
  document.getElementById('nav-links').innerHTML = `
    <button data-page="accueil" onclick="navigate('accueil')">🏠 Accueil</button>
    <button data-page="explorer" onclick="navigate('explorer')">🔭 Explorer</button>
    <button data-page="guide" onclick="navigate('guide')">📖 Guide</button>`;
}

// ═══════════════════════════
// ACCUEIL
// ═══════════════════════════
function renderAccueil(container){
  container.innerHTML = `
  <div style="background:linear-gradient(135deg,#1a3a2a,#0d1f17);color:var(--cream);padding:80px 20px;text-align:center;position:relative;overflow:hidden;">
    <div style="position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1539020140153-e479b8c22e70?w=1200&q=80') center/cover;opacity:.15;z-index:0;"></div>
    <div style="position:relative;z-index:1;max-width:800px;margin:0 auto;">
      <div style="font-size:3.5rem;color:var(--gold);">ⵜⴰⵡⵓⵔⵉ</div>
      <h1>L'Artisanat à portée de main</h1>
      <p>"Chaque geste est un héritage, chaque création est une âme."</p>
      <div style="margin-top:24px;display:flex;gap:14px;justify-content:center;">
        <button class="btn btn-primary" onclick="navigate('explorer')">🔭 Explorer les artisans</button>
        <button class="btn btn-gold" onclick="navigate('guide')">📖 Découvrir le Guide</button>
      </div>
    </div>
  </div>
  <div style="max-width:1200px;margin:50px auto;padding:0 22px;">
    <h2 style="text-align:center;">Notre Patrimoine</h2>
    <div class="grid-3" style="margin-top:20px;">
      ${Object.entries(ARTISANAT_LABELS).map(([key,label])=>`
        <div onclick="navigate('guide')" style="background:var(--forest);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;color:white;transition:.3s;">
          <div style="font-size:2rem;">${label.split(' ')[0]}</div>
          <h3>${label.split(' ').slice(1).join(' ')}</h3>
          <p style="color:var(--muted);font-size:.85rem;">Art ancestral marocain</p>
        </div>`).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════
// EXPLORER (liste simple)
// ═══════════════════════════
function renderExplorerPage(container){
  container.innerHTML = `
  <div style="background:var(--forest);padding:28px 20px;color:var(--cream);">
    <h1>🔭 Explorer les Artisans</h1>
    <p style="color:var(--muted);margin-top:8px;">Bientôt disponible – de nombreux artisans vous attendent.</p>
  </div>
  <div style="text-align:center;padding:40px;color:#888;">Aucun artisan inscrit pour le moment.</div>`;
}

// ═══════════════════════════
// GUIDE
// ═══════════════════════════
function renderGuidePage(container){
  let activeKey = 'poterie';
  const renderContent = ()=>{
    const g = GUIDE_CONTENT[activeKey];
    document.getElementById('gc').innerHTML = `
    <div style="position:relative;background:${g.couleur};color:white;padding:40px;border-radius:var(--radius);margin-bottom:24px;">
      <span style="font-size:3rem;">${g.emoji}</span><h1 style="font-family:'Playfair Display',serif;">${g.nom}</h1>
    </div>
    <div class="card"><h3>📜 Histoire</h3><p>${g.histoire}</p></div>
    <div class="card"><h3>🔧 Techniques</h3><p>${g.techniques}</p></div>
    <div class="card"><h3>🔮 Symbolisme</h3><p>${g.symbolisme}</p></div>
    <div class="card"><h3>🛡️ Conservation</h3><p>${g.conservation}</p></div>`;
  };
  container.innerHTML = `
  <div style="display:flex;flex-wrap:wrap;min-height:80vh;">
    <div style="background:var(--forest);width:250px;padding:18px 0;color:var(--cream);">
      <p style="padding:0 18px;color:var(--gold);font-size:.76rem;letter-spacing:2px;">GUIDE</p>
      ${Object.keys(ARTISANAT_LABELS).map(k=>`<button class="guide-nav-btn" data-key="${k}">${ARTISANAT_LABELS[k]}</button>`).join('')}
    </div>
    <div id="gc" style="flex:1;min-width:280px;padding:22px;"></div>
  </div>`;
  container.querySelectorAll('.guide-nav-btn').forEach(btn=>{
    btn.addEventListener('click', function(){
      activeKey = this.dataset.key;
      container.querySelectorAll('.guide-nav-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      renderContent();
    });
  });
  const first = container.querySelector('.guide-nav-btn'); 
  if(first) first.classList.add('active');
  renderContent();
}

// ═══════════════════════════
// INSCRIPTION (Fetch)
// ═══════════════════════════
function renderInscriptionPage(container){
  container.innerHTML = `
  <div style="max-width:500px;margin:60px auto;padding:0 20px;">
    <div class="card-dark" style="text-align:center;">
      <div style="font-size:3rem;">✉️</div>
      <h2 style="color:var(--gold);">Restez informé</h2>
      <p style="color:var(--muted);margin:10px 0 24px;">Recevez les actualités et nouveautés de TAWURI.</p>
      <div class="form-group">
        <input type="email" id="sub-email" placeholder="votre@email.com" style="text-align:center;">
      </div>
      <button class="btn btn-gold" style="width:100%;" id="sub-btn" onclick="subscribe()">S'inscrire</button>
      <p id="sub-msg" style="margin-top:16px;font-size:.82rem;color:var(--muted);"></p>
    </div>
  </div>`;
}
window.subscribe = async function(){
  const email = document.getElementById('sub-email').value.trim();
  const btn = document.getElementById('sub-btn');
  const msg = document.getElementById('sub-msg');
  if(!email.includes('@') || !email.includes('.')){
    showToast('Email invalide','error'); return;
  }
  btn.disabled = true;
  try{
    const res = await fetch('/inscription', {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({email})
    });
    if(res.ok){
      msg.innerHTML = '✅ Merci ! Votre email a bien été enregistré.';
      msg.style.color = 'var(--mint)';
      showToast('Inscription confirmée !','success');
    }else{
      msg.innerHTML = '❌ Une erreur est survenue.';
      msg.style.color = 'var(--red)';
      showToast('Erreur serveur','error');
    }
  }catch(e){
    msg.innerHTML = '❌ Problème de connexion.';
    showToast('Erreur réseau','error');
  }
  btn.disabled = false;
};

// ═══════════════════════════
// INIT
// ═══════════════════════════
updateNav();
navigate('accueil');
</script>
</body>
</html>
