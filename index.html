<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ⵜⴰⵡⵓⵔⵉ — TAWURI | Artisanat Marocain Authentique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--cream:#f5f0e8;--dark:#0d1f17;--forest:#1a3a2a;--forest-m:#245038;--forest-l:#2f6847;--sage:#4a8c5c;--mint:#7ab893;--gold:#c9a84c;--gold-l:#e8c96a;--text:#f0ebe0;--muted:#a8c4b0;--red:#f87171;--border:#2f6847;--white:#ffffff;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.18);--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Lato','Helvetica',sans-serif;background:var(--cream);color:#1a1a1a;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
h1,h2,h3,h4,.font-title{font-family:'Playfair Display','Georgia',serif}
.geometric-line{height:2px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 10px,transparent 10px,transparent 18px);margin:16px 0;opacity:.6}
nav{background:linear-gradient(90deg,var(--forest) 0%,#1a3a2a 100%);padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;min-height:72px;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
nav .logo{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
nav .logo .tifinagh{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);font-weight:bold;text-shadow:0 0 15px rgba(201,168,76,0.6);transition:var(--transition)}
nav .logo:hover .tifinagh{transform:scale(1.05)}
nav .logo .brand{font-family:'Playfair Display',serif;color:var(--cream);font-size:.9rem;letter-spacing:4px}
nav .nav-links{display:flex;gap:4px;flex-wrap:wrap}
nav .nav-links button{background:transparent;color:var(--muted);border:none;padding:8px 12px;cursor:pointer;font-size:.8rem;border-radius:24px;transition:var(--transition);font-family:'Lato',sans-serif;font-weight:600;letter-spacing:.5px;position:relative}
nav .nav-links button::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:var(--gold);transition:.3s;transform:translateX(-50%)}
nav .nav-links button:hover{background:rgba(255,255,255,0.1);color:var(--gold)}
nav .nav-links button:hover::after{width:60%}
nav .nav-links button.active{background:var(--forest-m);color:var(--gold);font-weight:bold}
nav .auth-area{display:flex;gap:8px;align-items:center}
nav .auth-area .user-badge{color:var(--cream);font-size:.82rem;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);padding:6px 12px;border-radius:24px}
nav .auth-area button{background:var(--forest-l);color:var(--cream);border:none;padding:8px 16px;cursor:pointer;border-radius:24px;font-size:.8rem;font-weight:600;transition:var(--transition);font-family:'Lato',sans-serif}
nav .auth-area button:hover{background:var(--gold);color:var(--dark)}
.page{display:none;animation:fadeSlideIn .45s ease}
.page.active{display:block}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card{background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin:12px 0;border:1px solid rgba(201,168,76,0.25);transition:all .4s ease;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,rgba(201,168,76,0.04) 0%,transparent 80%);pointer-events:none}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,0.22);border-color:var(--gold-l)}
.card-dark{background:rgba(13,31,23,0.96);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:12px 0}
.card-gold{background:linear-gradient(135deg,#fdf8ed,#faf3e0);border:2px solid var(--gold-l);border-radius:var(--radius);padding:24px;margin:12px 0}
.artisan-card{background:rgba(255,255,255,0.95);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all .45s cubic-bezier(.25,.8,.25,1.2);border:1px solid rgba(201,168,76,0.2);display:flex;flex-direction:column;cursor:pointer}
.artisan-card:hover{transform:translateY(-8px) scale(1.015);box-shadow:0 18px 44px rgba(0,0,0,0.28);border-color:var(--gold)}
.artisan-card .artisan-body{padding:18px;flex:1;display:flex;flex-direction:column;gap:6px}
.btn{display:inline-block;padding:11px 22px;border-radius:30px;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:.87rem;font-weight:700;transition:all .3s ease;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 3px 8px rgba(0,0,0,0.1)}
.btn-primary{background:var(--forest-l);color:var(--cream)}
.btn-primary:hover{background:var(--sage);transform:translateY(-2px)}
.btn-gold{background:var(--gold);color:var(--dark)}
.btn-gold:hover{background:var(--gold-l);transform:translateY(-2px)}
.btn-outline{background:transparent;border:2px solid var(--forest-l);color:var(--forest)}
.btn-outline:hover{background:var(--forest-l);color:var(--cream)}
.btn-sm{padding:7px 16px;font-size:.78rem}
.btn-danger{background:#5c1a1a;color:var(--red)}
.btn-danger:hover{background:#7a2020}
.btn-info{background:#1a3a5c;color:white}
input,select,textarea{width:100%;padding:11px 13px;border:2px solid #d5cbb8;border-radius:var(--radius);font-family:inherit;font-size:.93rem;background:var(--white);transition:var(--transition);color:#1a1a1a}
input:focus,select:focus,textarea:focus{border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(201,168,76,0.2)}
label{display:block;font-weight:600;margin-bottom:4px;color:var(--forest);font-size:.84rem}
.form-group{margin-bottom:13px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{padding:14px 22px;border-radius:28px;font-size:.88rem;box-shadow:var(--shadow);animation:toastIn .45s ease,toastOut .4s ease 2.8s forwards;font-weight:600;max-width:320px}
.toast.success{background:var(--forest-m);color:var(--cream)}
.toast.error{background:#5c1a1a;color:#fca5a5}
.toast.info{background:#1a3a5c;color:#bfdbfe}
@keyframes toastIn{from{opacity:0;transform:translateX(70px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-20px)}}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9998;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--white);border-radius:var(--radius);padding:28px;max-width:520px;width:93%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.35);position:relative}
/* Stars */
.stars-input{display:flex;gap:6px;font-size:2rem;cursor:pointer;justify-content:center;margin:12px 0}
.star-btn{color:#d0c8b0;transition:.2s;background:none;border:none;cursor:pointer;font-size:2rem;padding:0}
.star-btn.active{color:var(--gold)}
/* Messages */
.msg-area{display:flex;flex-direction:column;gap:8px;padding:16px;height:340px;overflow-y:auto;background:#f8f5ee;border-radius:var(--radius)}
.msg-bubble{max-width:72%;padding:10px 16px;border-radius:18px;font-size:.88rem;word-break:break-word}
.msg-bubble.sent{background:var(--forest-l);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.msg-bubble.received{background:#e8e4dc;color:#333;align-self:flex-start;border-bottom-left-radius:4px}
.msg-meta{font-size:.7rem;opacity:.65;margin-top:3px}
/* RDV cards */
.rdv-card{background:white;border-radius:var(--radius);padding:14px 18px;margin:8px 0;border-left:4px solid var(--mint);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.rdv-card.confirmed{border-color:var(--sage)}
.rdv-card.reported{border-color:var(--gold)}
.rdv-card.pending{border-color:var(--mint)}
/* Profile */
.profile-photo-circle{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);display:block}
.profile-photo-placeholder{width:90px;height:90px;border-radius:50%;background:var(--forest-m);display:flex;align-items:center;justify-content:center;font-size:2.2rem;border:3px solid var(--gold)}
/* Creation */
.creation-card{background:white;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid rgba(201,168,76,0.2)}
.creation-card img{width:100%;height:150px;object-fit:cover}
.creation-card .creation-body{padding:12px}
/* Star display */
.star-display{color:var(--gold);letter-spacing:1px}
/* Guide nav */
.guide-nav-btn{display:block;width:100%;text-align:left;padding:13px 20px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:'Lato',sans-serif;font-size:.9rem;transition:.2s;border-left:3px solid transparent}
.guide-nav-btn:hover,.guide-nav-btn.active{background:var(--forest-m);color:var(--gold);border-left-color:var(--gold)}
/* Stat card */
.stat-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:22px;text-align:center;transition:.3s}
.stat-card:hover{background:rgba(255,255,255,0.1);transform:translateY(-3px)}
.stat-icon{font-size:2rem;margin-bottom:8px}
.stat-num{font-size:2.2rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold)}
.stat-label{font-size:.82rem;color:var(--muted);margin-top:4px}
/* Thread list */
.thread-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:10px}
.thread-item:hover,.thread-item.active{background:rgba(255,255,255,0.1)}
/* Support */
.support-item{background:rgba(255,255,255,0.05);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid rgba(201,168,76,0.15)}
.support-item h4{color:var(--gold);margin-bottom:6px}
.support-item p{color:var(--muted);font-size:.9rem}
/* Tag */
.tag{display:inline-block;background:var(--forest-m);color:var(--mint);border-radius:20px;padding:3px 12px;font-size:.78rem;font-weight:600}
</style>
</head>
<body>
<nav id="nav">
  <div class="logo" onclick="navigate('accueil')">
    <span class="tifinagh">ⵜⴰⵡⵓⵔⵉ</span><span class="brand">TAWURI</span>

<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const ARTISANAT_LABELS={poterie:'🏺 Poterie',tissage:'🪡 Tissage / Tapis',bijoux:'🪙 Bijouterie',bois:'🪵 Bois sculpté',maroquinerie:'🎨 Maroquinerie',zellige:'🪔 Zellige'};
const SPECIALITES=Object.values(ARTISANAT_LABELS);
const VILLES=['Marrakech','Fès','Rabat','Agadir','Ouarzazate','Tiznit','Essaouira','Casablanca'];

// Pas d'artisans prédéfinis — la liste est vide au départ.

const GUIDE_CONTENT={
  poterie:{emoji:"🏺",nom:"La Poterie Marocaine",couleur:"#8B4513",couleur2:"#D2691E",
    histoire:"La poterie marocaine est l'une des formes d'artisanat les plus anciennes du Maroc, avec des traces archéologiques remontant à plus de 5 000 ans, dès le Néolithique. Dans les sites préhistoriques de la région d'Ifrane et du Kef-el-Ghar, les fouilles ont mis au jour des fragments de céramique à décor incisé témoignant d'une maîtrise précoce de l'argile. Avec l'arrivée des Phéniciens au IXe siècle av. J.-C., puis des Romains qui fondèrent Volubilis, les techniques se diversifient — le tour rapide fait son apparition, bouleversant la production artisanale. Durant la période islamique, Fès s'impose comme capitale de la céramique émaillée. Sous les Idrissides (IXe siècle), des ateliers spécialisés se multiplient dans le quartier d'Ain Khail. Sous les Mérinides (XIIIe–XVe siècle), naît la célèbre faïence bleue au cobalt importé d'Iran. Dans le Rif et le Haut Atlas, ce sont essentiellement les femmes berbères qui perpétuent cet art sacré, façonnant l'argile à la main selon des gestes transmis depuis des millénaires.",
    histoire_suite:"Au XVIe siècle, l'expulsion des Morisques d'Espagne amène au Maroc des milliers d'artisans andalous porteurs de nouvelles techniques : l'émail stannifère blanc, les décors floraux raffinés. Safi devient la capitale de la polychromie. Aujourd'hui, la poterie marocaine vit une renaissance remarquable : les jeunes potiers s'approprient l'héritage ancestral tout en l'enrichissant d'influences contemporaines. Les coopératives de femmes du Haut Atlas exportent leurs créations dans les galeries de Paris, New York et Tokyo.",
    techniques:"L'argile rouge de Safi produit une terracotta chaude. L'argile blanche calcaire de Fès est idéale pour les émaux opaques. Le façonnage se décline en colombinage, modelage au tour (dawwara) et moulage par pression. La cuisson dans les fours traditionnels à bois (furn) à 700–950°C transforme l'argile en céramique ; une deuxième cuisson à 1050°C vitrifie les émaux.",
    symbolisme:"Le losange (tafout) symbolise le soleil et la fertilité. Le triangle (iziker) représente la montagne. Le zigzag (zfek) évoque l'eau. La main de Fatima (khamsa) repousse le mauvais œil. L'étoile à 8 branches représente les 8 portes du paradis. Le bleu cobalt évoque le ciel divin ; le vert sacré est la couleur du Prophète.",
    conservation:"Nettoyage : eau tiède + savon neutre, jamais d'abrasifs. Les pièces non vernissées sont poreuses : évitez les liquides acides. Les tagines doivent être culottés avant la première utilisation : 12h dans l'eau froide, frotter d'huile d'olive, chauffer à feu doux 2h. Stockez à l'abri des chocs thermiques.",
    outils:[["🔄 Tour de potier (dawwara)","Façonnage rapide et symétrique."],["🪨 Galets de polissage","Brillance naturelle avant cuisson."],["🔥 Four traditionnel (furn)","700–950 °C, bois ou gaz."],["🖌️ Pinceaux en poils naturels","Application des pigments."],["📐 Moules en plâtre","Formes répétitives (tagines, assiettes)."],["⚗️ Pigments naturels","Cobalt, oxyde de cuivre, oxyde de fer."]],
    regions:[["🌿 Fès","Quartier Ain Khail — 400+ ateliers, faïence bleue légendaire."],["🌸 Safi","Céramiques polychromes aux motifs floraux depuis le XVIe siècle."],["🟢 Tamegroute","Poterie au vert profond unique, oxydes de manganèse locaux."],["🏔️ Haut Atlas","Poterie berbère façonnée par les femmes, non vernissée."],["🌺 Marrakech","Fusion andalouse-berbère, souk des potiers très actif."]],
    tawuri:"Sur TAWURI, Fatima Ouhaddou vous accueille dans son atelier de Marrakech. Maîtresse potière depuis 20 ans, elle propose des séances d'initiation de 2 à 3 heures. Réservez depuis Explorer → Poterie."
  },
  tissage:{emoji:"🪡",nom:"Le Tissage Marocain",couleur:"#722F37",couleur2:"#C84B31",
    histoire:"Le tissage est pratiqué depuis plus de 4 000 ans par les Berbères du Haut Atlas. Le tapis marocain est le récit d'une vie, d'une lignée, d'un territoire — chaque symbole tissé a une signification précise. Sous les Dynasties Mérinides et Saâdiennes, le tissage connaît son apogée à Rabat grâce aux artisans andalous. Le tapis de Rabat devient l'un des objets les plus prisés des cours royales européennes.",
    histoire_suite:"Au XXe siècle, des coopératives féminines sont établies dans les régions reculées du Haut Atlas, offrant aux femmes des revenus directs. Aujourd'hui, les tapis de Beni Ouarain ou d'Azilal se vendent dans les galeries de design de Paris, Los Angeles et Tokyo.",
    techniques:"La laine de mouton (taghatt) est lavée, cardée, puis filée au fuseau (taghzalt). La teinture végétale précède le tissage : garance (rouge), indigo (bleu), henné (orangé). Le nœud berbère (asymétrique) est le plus répandu dans le Haut Atlas. La densité varie entre 40 000 et 400 000 nœuds par m².",
    symbolisme:"Le losange central (tafout) représente la femme créatrice. Les zigzags (zfek) évoquent l'eau. Les étoiles (itran) protègent contre le mauvais œil. Les mains de Fatima sont tissées dans les tapis de mariage pour protéger le nouveau foyer.",
    conservation:"Aspirez dans le sens du poil une fois par semaine. Tournez le tapis de 180° tous les six mois pour une usure uniforme. Protégez des UV directs. En cas de tache liquide : tamponnez immédiatement, saupoudrez de sel, aspirez après 2h. Lavage annuel par un professionnel.",
    outils:[["🧶 Métier à tisser horizontal","Traditionnel, pliable, nomade."],["🪡 Navette (taqqit)","Passe la trame entre les fils."],["🪮 Peigne de tissage (mdigg)","Tasse les nœuds pour une texture dense."],["🐑 Cardes à laine","Démêlent les fibres avant le filage."],["🔄 Fuseau (taghzalt)","File la laine en fil régulier."],["✂️ Ciseaux de tonte","Égalisent la hauteur du velours."]],
    regions:[["🏔️ Beni Ouarain","Tapis ivoire à motifs noirs géométriques, très prisés à l'international."],["🌄 Taznakht","Centre de coopératives féminines, motifs colorés sur fond rouge."],["🏛️ Rabat","Tapis de ville à nœuds symétriques, héritage andalou."],["⛰️ Haut Atlas","Tapis polychromes aux couleurs vives."],["🌿 Azilal","Tapis expressifs abstraits très recherchés des collectionneurs."]],
    tawuri:"Sur TAWURI, Hassan Ait Ben vous initie aux secrets du métier à tisser. En 3 à 4 heures, vous apprendrez le nœud berbère. Réservez via Explorer → Tissage."
  },
  bijoux:{emoji:"🪙",nom:"La Bijouterie Marocaine",couleur:"#1a3a5c",couleur2:"#2e6da4",
    histoire:"La bijouterie marocaine couvre plus de trois millénaires. Les premières parures remontent au IIIe millénaire av. J.-C. (grottes d'Ifri n'Ammar). Avec l'islamisation, la prohibition de la représentation figurative oriente toute la création vers la géométrie pure. Tiznit est la capitale nationale du bijou en argent.",
    histoire_suite:"Les Saâdiens marquent l'apogée de la bijouterie de cour. Les femmes amazighes portent leurs bijoux d'argent comme marqueurs d'identité culturelle. Aujourd'hui, une nouvelle génération d'orfèvres associe techniques ancestrales et formes contemporaines.",
    techniques:"L'argent 999/1000 est travaillé par ciselure (naqqche), filigrane (sharabia), granulation, repoussé (tikniwt) et niello (khal). L'émaillage cloisonné, héritage andalou, remplit des alvéoles métalliques d'émaux colorés cuits au four.",
    symbolisme:"La fibule (tizerzaï) — forme circulaire — symbolise le soleil. La khamsa protège des cinq sens contre le mauvais œil. Le corail rouge évoque le sang et la vie. L'ambre absorbe les énergies négatives. Les inscriptions coraniques gravées en font de véritables boucliers spirituels.",
    conservation:"Argent : nettoyez au bicarbonate + eau tiède, séchez immédiatement. Rangez dans des sachets en flanelle. Évitez contact avec parfums. Corail : eau tiède douce uniquement. Ambre : chiffon légèrement humide, quelques gouttes d'huile d'olive pour raviver l'éclat.",
    outils:[["⚒️ Burin (mikchach)","Grave le métal à froid en motifs géométriques."],["🔨 Marteau d'orfèvre","Façonne et courbe les feuilles de métal."],["🔧 Étau de bijoutier","Maintient la pièce immobile."],["🔥 Chalumeau de soudure","Assemble par soudure à l'argent."],["🪨 Pierre de touche","Vérifie la pureté du métal."],["📐 Lime et abrasif","Polissent la surface."]],
    regions:[["🌿 Tiznit","Capitale du bijou argent, souk des orfèvres mondialement connu."],["🏔️ Anti-Atlas","Bijoux archaïques en argent massif berbère."],["🌺 Marrakech","Bijoux urbains, mêlant or, argent, ambre, grenat."],["🌸 Fès","Bijouterie en or filigrane très fin, héritage andalou."],["🏝️ Taroudant","Bijoux nomades avec corail rouge et dattes d'argent."]],
    tawuri:"Sur TAWURI, Malika Berrada à Tiznit vous initie au martelage et à la ciselure. Réservez via Explorer → Bijouterie."
  },
  bois:{emoji:"🪵",nom:"Le Bois Sculpté",couleur:"#3B2314",couleur2:"#7B5E3B",
    histoire:"La mosquée Qarawiyyin de Fès (fondée en 859) possède des boiseries sculptées d'une complexité géométrique stupéfiante. Sous les Almoravides, les artisans andalous apportent la technique du moucharabieh. Les Mérinides portent la sculpture sur bois à son sommet absolu.",
    histoire_suite:"Essaouira développe au XVIIIe siècle la marqueterie de thuya (Tetraclinis articulata). Deux siècles plus tard, la ville compte 800+ ateliers. Les jeunes menuisiers associent techniques ancestrales et designs contemporains pour séduire les marchés de design international.",

let state={
  currentUser:null,users:[],
  artisans:[],
  rdvs:[],evaluations:[],creations:[],
  messages:{},statuts:{},
  guideActif:true,guideData:JSON.parse(JSON.stringify(GUIDE_CONTENT))
};
let navParams={};
let pendingVerif=null; // {code, userData}

function loadState(){
  try{
    const s=localStorage.getItem('tawuri_v2');
    if(s){
      const p=JSON.parse(s);
      state.currentUser=p.currentUser||null;
      state.users=p.users||[];
      state.artisans=p.artisans||state.artisans;
      state.rdvs=p.rdvs||[];
      state.evaluations=p.evaluations||[];
      state.creations=p.creations||[];
      state.messages=p.messages||{};
      state.statuts=p.statuts||{};
      state.guideActif=p.guideActif!==undefined?p.guideActif:true;
      state.guideData=p.guideData||state.guideData;
    }
  }catch(e){}
}
function saveState(){
  try{
    const toSave={
      currentUser:state.currentUser,users:state.users,artisans:state.artisans,
      rdvs:state.rdvs,evaluations:state.evaluations,creations:state.creations,
      messages:state.messages,statuts:state.statuts,
      guideActif:state.guideActif,guideData:state.guideData
    };
    localStorage.setItem('tawuri_v2',JSON.stringify(toSave));
  }catch(e){showToast('⚠️ Espace de stockage insuffisant pour les images.','error');}
}
loadState();

function showToast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),3400);
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function san(s){return String(s).replace(/[<>"']/g,'').trim();}
function gCode(){return String(Math.floor(100000+Math.random()*900000));}
function getThreadId(a,b){return[a,b].sort().join('|||');}
function fmtDate(ts){if(!ts)return'';const d=new Date(ts);return d.toLocaleDateString('fr-MA',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('fr-MA',{hour:'2-digit',minute:'2-digit'});}
function fmtDay(ts){if(!ts)return'';return new Date(ts).toLocaleDateString('fr-MA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function getAvgRating(artisanEmail){
  const evs=state.evaluations.filter(e=>e.artisanEmail===artisanEmail);
  if(!evs.length)return null;
  return(evs.reduce((s,e)=>s+e.note,0)/evs.length).toFixed(1);
}
function renderStars(n){return'★'.repeat(Math.round(n))+'☆'.repeat(5-Math.round(n));}
function isBlocked(email){return state.statuts[email]==='Bloqué';}
function isRestricted(email){return state.statuts[email]==='Restreint';}
function getStatus(email){return state.statuts[email]||'Actif';}
function resizeImage(file,maxW,cb){
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(maxW/img.width,maxW/img.height,1);
      const c=document.createElement('canvas');
      c.width=img.width*ratio;c.height=img.height*ratio;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      cb(c.toDataURL('image/jpeg',0.7));
    };img.src=e.target.result;
  };r.readAsDataURL(file);
}

window.navigate=function(page,params={}){
  navParams=params;
  const main=document.getElementById('main-content');main.innerHTML='';
  const div=document.createElement('div');div.className='page active';div.id='page-'+page;main.appendChild(div);
  document.querySelectorAll('.nav-links button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  const R={
    accueil:renderAccueil,profil:renderProfil,monprofil:renderMonProfil,
    explore:renderExplore,'artisan-profil':renderArtisanProfilePage,
    msg:renderMessagerie,dashboard:renderDashboard,guide:renderGuide,
    calendrier:renderCalendrier,catalogue:renderCatalogue,support:renderSupport,admin:renderAdmin
  };
  if(R[page])R[page](div);
  updateNav();window.scrollTo({top:0,behavior:'smooth'});
};

function getNavPages(){
  const u=state.currentUser;
  if(!u)return[['🏠 Accueil','accueil'],['🔭 Explorer','explore'],['📖 Guide','guide']];
  if(u.role==='admin')return[['🏠 Accueil','accueil'],['⚙️ Administration','admin']];
  if(u.role==='artisan')return[['🏠 Accueil','accueil'],['👤 Mon Profil','monprofil'],['📅 Calendrier','calendrier'],['🗂️ Catalogue','catalogue'],['💬 Messagerie','msg'],['📊 Tableau de bord','dashboard'],['🛠️ Support','support']];
  return[['🏠 Accueil','accueil'],['👤 Mon Profil','monprofil'],['🔭 Explorer','explore'],['💬 Messagerie','msg'],['📊 Tableau de bord','dashboard'],['📖 Guide','guide']];
}

function updateNav(){
  const nl=document.getElementById('nav-links'),aa=document.getElementById('auth-area'),u=state.currentUser;
  nl.innerHTML=getNavPages().map(([l,p])=>`<button data-page="${p}" onclick="navigate('${p}')">${l}</button>`).join('');
  if(u){
    aa.innerHTML=`<span class="user-badge">${u.avatar||'👤'} ${esc(u.nom)}</span><button onclick="doLogout()">Déconnexion</button>`;
  }else{
    aa.innerHTML=`<button onclick="navigate('profil')">🔒 Connexion</button><button onclick="adminLogin()" style="background:rgba(201,168,76,0.2);color:var(--gold);">👑 Admin</button>`;
  }
  document.querySelectorAll('.nav-links button').forEach(b=>{
    const cur=document.getElementById('main-content')?.firstChild?.id?.replace('page-','');
    b.classList.toggle('active',b.dataset.page===cur);
  });
}
window.doLogout=function(){
  state.currentUser=null;saveState();updateNav();showToast('👋 Déconnecté(e)');navigate('accueil');
};
window.adminLogin=function(){
  showModal(`
  <div style="text-align:center;">
    <div style="font-size:2.5rem;margin-bottom:10px;">👑</div>
    <h3 style="color:var(--forest);margin-bottom:8px;">Accès Administrateur</h3>

    <div class="form-group">
      <input type="password" id="admin-code-input" placeholder="Code administrateur" style="text-align:center;font-size:1.1rem;letter-spacing:4px;" autofocus>
    </div>
    <div id="admin-login-error" style="color:#e53e3e;font-size:.83rem;min-height:20px;margin-bottom:8px;"></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" style="flex:1;" onclick="submitAdminCode()">Entrer →</button>
    </div>
  </div>`);
  setTimeout(()=>{
    const inp=document.getElementById('admin-code-input');
    if(inp){
      inp.focus();
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitAdminCode();});
    }

window.submitAdminCode=function(){

  const code=inp.value;

function renderInscription(tc,role,setRole){
  tc.innerHTML=`
  <h3 style="margin-bottom:14px;color:var(--forest);">✨ Créer un compte</h3>
  <div style="display:flex;gap:8px;margin-bottom:16px;">
    <button class="btn ${role==='etudiant'?'btn-gold':'btn-outline'} btn-sm" id="re">🧑‍🎓 Étudiant</button>
    <button class="btn ${role==='artisan'?'btn-gold':'btn-outline'} btn-sm" id="ra">🏺 Artisan</button>
  </div>
  ${role==='etudiant'?`
    <div class="form-group"><label>Nom complet *</label><input id="rn" placeholder="Votre nom complet"></div>
    <div class="form-group"><label>Adresse email *</label><input type="email" id="re2" placeholder="exemple@email.com"></div>
    <div class="form-group"><label>Mot de passe *</label><input type="password" id="rp" placeholder="Minimum 6 caractères"></div>
    <div class="form-group"><label>Ville *</label><select id="rv">${VILLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
  `:`
    <div class="form-group"><label>Nom complet *</label><input id="rn" placeholder="Votre nom complet"></div>
    <div class="form-group"><label>Numéro de téléphone *</label><input id="rt" placeholder="06XXXXXXXX"></div>
    <div class="form-group"><label>Ville *</label><select id="rv">${VILLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
    <div class="form-group"><label>Adresse de l'atelier *</label><input id="rad" placeholder="Souk, quartier, médina..."></div>
    <div class="form-group"><label>Spécialité *</label><select id="rs">${SPECIALITES.map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="form-group"><label>Mot de passe *</label><input type="password" id="rp" placeholder="Minimum 6 caractères"></div>
  `}
  <button class="btn btn-primary" style="width:100%;" id="rb">Créer mon compte →</button>`;
  document.getElementById('re').onclick=()=>setRole('etudiant');
  document.getElementById('ra').onclick=()=>setRole('artisan');
  document.getElementById('rb').onclick=()=>{
    const nom=san(document.getElementById('rn').value);
    const pwd=document.getElementById('rp').value;
    if(!nom||pwd.length<6){showToast('⚠️ Remplissez tous les champs (mdp min. 6 caractères).','error');return;}
    if(role==='etudiant'){
      const email=san(document.getElementById('re2').value.toLowerCase());

    }else{

      if(!tel||tel.length<9){showToast('⚠️ Téléphone invalide.','error');return;}
      if(state.artisans.find(a=>a.tel===tel)){showToast('⚠️ Ce numéro est déjà utilisé.','error');return;}
      const ville=document.getElementById('rv').value;
      const adresse=san(document.getElementById('rad').value);

window.verifyCode=function(){

  if(inp.value.trim()===pendingVerif.code){
    const u=pendingVerif.userData;
    if(!u.dateInscription)u.dateInscription=Date.now();
    state.users.push(u);state.currentUser=u;
    pendingVerif=null;saveState();updateNav();closeModal();
    showToast(`✅ Compte créé ! Bienvenue, ${u.nom} !`);navigate('dashboard');

function renderConnexion(tc){

    <button class="btn btn-primary" style="width:100%;" id="lb">Se connecter →</button>`;

    const nom=san(document.getElementById('en').value);
    const ville=document.getElementById('ev').value;
    const fileInp=document.getElementById('ep');
    const doSave=(photo)=>{
      const idx=state.users.findIndex(x=>x.email===u.email);
      const art=state.artisans.findIndex(x=>x.email===u.email);
      if(idx>=0){state.users[idx].nom=nom;state.users[idx].ville=ville;if(photo)state.users[idx].photo=photo;}

    state.creations=state.creations.filter(c=>c.id!==id);saveState();showToast('🗑 Création supprimée.');re();

function renderMonProfilArtisan(container){
  const u=state.currentUser;
  const re=()=>{
    container.innerHTML=`
    <div style="max-width:900px;margin:30px auto;padding:0 20px;">
      <div class="card-dark" style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
        ${u.photo?`<img src="${u.photo}" class="profile-photo-circle" alt="photo">`:`<div class="profile-photo-placeholder">${u.avatar||'🏺'}</div>`}
        <div style="flex:1;">
          <h2 style="color:var(--gold);">${esc(u.nom)}</h2>
          <p style="color:var(--muted);">${esc(u.spec)} — ${esc(u.ville)}</p>
          <p style="color:var(--muted);font-size:.85rem;">📞 ${esc(u.tel)} | 📍 ${esc(u.adresse)}</p>
          ${u.bio?`<p style="color:var(--mint);font-size:.88rem;margin-top:4px;">${esc(u.bio)}</p>`:''}
          ${(()=>{const r=getAvgRating(u.email);return r?`<p style="color:var(--gold);">${renderStars(r)} ${r}/5</p>`:''})()}
        </div>
        <button class="btn btn-gold btn-sm" onclick="editArtisanProfile()">✏️ Modifier</button>
      </div>
      <div class="card" style="margin-top:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3 style="color:var(--forest);">📄 Catalogue PDF</h3>
          <label class="btn btn-primary btn-sm" style="cursor:pointer;">📤 Uploader<input type="file" id="pdf-inp" accept=".pdf" style="display:none;" onchange="uploadCataloguePdf(this)"></label>
        </div>
        ${u.cataloguePdf?`<div style="margin-top:10px;"><a href="${u.cataloguePdf}" download="catalogue_${esc(u.nom)}.pdf" class="btn btn-gold btn-sm">⬇ Télécharger mon catalogue PDF</a> <button class="btn btn-danger btn-sm" onclick="deleteCataloguePdf()">🗑 Supprimer</button></div>`:
        `<p style="color:#888;font-size:.88rem;margin-top:8px;">Aucun PDF uploadé. Ajoutez votre catalogue de produits.</p>`}
      </div>
    </div>`;
  };re();

  window.editArtisanProfile=function(){
    const art=state.artisans.find(a=>a.email===u.email)||u;
    showModal(`
    <h3 style="color:var(--forest);margin-bottom:16px;">✏️ Modifier mon profil</h3>
    <div class="form-group"><label>Nom complet</label><input id="an" value="${esc(art.nom)}"></div>
    <div class="form-group"><label>Téléphone</label><input id="at" value="${esc(art.tel)}"></div>
    <div class="form-group"><label>Ville</label><select id="av">${VILLES.map(v=>`<option ${v===art.ville?'selected':''}>${v}</option>`).join('')}</select></div>
    <div class="form-group"><label>Adresse de l'atelier</label><input id="aad" value="${esc(art.adresse)}"></div>
    <div class="form-group"><label>Bio / Description</label><textarea id="ab" rows="3">${esc(art.bio)}</textarea></div>
    <div class="form-group"><label>Photo de profil</label><input type="file" id="aphoto" accept="image/*"></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveArtisanProfile()">Sauvegarder</button>
    </div>`);
  };

  window.saveArtisanProfile=function(){
    const nom=san(document.getElementById('an').value);
    const tel=san(document.getElementById('at').value);
    const ville=document.getElementById('av').value;
    const adresse=san(document.getElementById('aad').value);
    const bio=document.getElementById('ab').value.trim();
    const fileInp=document.getElementById('aphoto');
    const doSave=(photo)=>{
      const idx=state.artisans.findIndex(a=>a.email===u.email);
      const uidx=state.users.findIndex(a=>a.email===u.email);
      const update={nom,tel,ville,adresse,bio};if(photo)update.photo=photo;
      if(idx>=0)Object.assign(state.artisans[idx],update);
      if(uidx>=0)Object.assign(state.users[uidx],update);
      Object.assign(state.currentUser,update);
      saveState();closeModal();showToast('✅ Profil mis à jour.');re();

      const idx=state.artisans.findIndex(a=>a.email===u.email);
      if(idx>=0)state.artisans[idx].cataloguePdf=data;
      state.currentUser.cataloguePdf=data;
      saveState();showToast('✅ Catalogue PDF uploadé.');re();
    };r.readAsDataURL(file);
  };

  window.deleteCataloguePdf=function(){
    const idx=state.artisans.findIndex(a=>a.email===u.email);
    if(idx>=0)state.artisans[idx].cataloguePdf='';
    state.currentUser.cataloguePdf='';saveState();showToast('🗑 PDF supprimé.');re();
  };
}

function renderExplore(container){
  let fSpec='tous',fVille='toutes',fSearch='';
  const render=()=>{
    const grid=container.querySelector('#ag');
    if(!grid)return;
    let list=state.artisans.filter(a=>!isBlocked(a.email));
    if(fSpec!=='tous')list=list.filter(a=>a.spec===fSpec);
    if(fVille!=='toutes')list=list.filter(a=>a.ville===fVille);
    if(fSearch)list=list.filter(a=>a.nom.toLowerCase().includes(fSearch)||a.spec.toLowerCase().includes(fSearch)||a.ville.toLowerCase().includes(fSearch));
    grid.innerHTML=list.length?list.map(a=>{
      const avg=getAvgRating(a.email);
      const ev=state.evaluations.filter(e=>e.artisanEmail===a.email).length;
      return`<div class="artisan-card">
        ${a.photo?`<img src="${a.photo}" style="width:100%;height:180px;object-fit:cover;" alt="${esc(a.nom)}">`:`<div style="width:100%;height:180px;background:var(--forest);display:flex;align-items:center;justify-content:center;font-size:4rem;">${a.avatar||'🏺'}</div>`}
        <div class="artisan-body">
          <h3 style="color:var(--forest);">${esc(a.nom)}</h3>
          <p style="font-size:.88rem;color:var(--sage);">${esc(a.spec)}</p>
          <p style="font-size:.83rem;color:#666;">📍 ${esc(a.ville)}</p>
          ${avg?`<p class="star-display" style="font-size:.88rem;">${renderStars(avg)} <span style="color:#666;">${avg} (${ev} avis)</span></p>`:`<p style="font-size:.8rem;color:#999;">Pas encore évalué</p>`}
          ${isRestricted(a.email)?`<span class="tag">⚠️ Restreint</span>`:''}
          <div style="margin-top:auto;padding-top:10px;">
            <button class="btn btn-gold btn-sm" style="width:100%;" onclick="navigate('artisan-profil',{email:'${a.email}'})">👁 Voir le profil</button>
          </div>
        </div>
      </div>`;
    }).join(''):`<div style="grid-column:1/-1;text-align:center;padding:50px;color:#888;"><p>Aucun artisan trouvé avec ces critères.</p></div>`;
  };
  container.innerHTML=`
  <div style="background:var(--forest);padding:28px 20px;color:var(--cream);">
    <h1 style="font-family:'Playfair Display',serif;margin-bottom:16px;">🔭 Explorer les Artisans</h1>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <input id="fsearch" placeholder="🔍 Rechercher nom, spécialité, ville..." style="flex:2;min-width:200px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;">
      <select id="fspec" style="flex:1;min-width:160px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;">
        <option value="tous">Toutes spécialités</option>${SPECIALITES.map(s=>`<option value="${s}">${s}</option>`).join('')}
      </select>
      <select id="fville" style="flex:1;min-width:140px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;">
        <option value="toutes">Toutes villes</option>${VILLES.map(v=>`<option>${v}</option>`).join('')}
      </select>
    </div>
  </div>
  <div id="ag" class="grid-3" style="max-width:1100px;margin:0 auto;padding:22px;"></div>`;
  container.querySelector('#fsearch').addEventListener('input',function(){fSearch=this.value.toLowerCase().trim();render();});
  container.querySelector('#fspec').addEventListener('change',function(){fSpec=this.value;render();});
  container.querySelector('#fville').addEventListener('change',function(){fVille=this.value;render();});
  render();
}

function renderMessagerie(container){
  const u=state.currentUser;
  if(!u){container.innerHTML='<p style="text-align:center;padding:40px;">Connectez-vous pour accéder à la messagerie.</p>';return;}

  let activeThread=null;
  if(navParams.artisanEmail)activeThread=navParams.artisanEmail;

  const getMyThreads=()=>{
    const threads=[];
    if(u.role==='etudiant'){
      state.artisans.forEach(a=>{
        const tid=getThreadId(u.email,a.email);
        if(state.messages[tid]&&state.messages[tid].length)threads.push({other:a,tid,last:state.messages[tid].slice(-1)[0]});
      });
      if(activeThread&&!threads.find(t=>t.other.email===activeThread)){
        const a=state.artisans.find(x=>x.email===activeThread);
        if(a){const tid=getThreadId(u.email,a.email);threads.unshift({other:a,tid,last:null});}
      }
    }else if(u.role==='artisan'){
      state.users.filter(x=>x.role==='etudiant').forEach(s=>{
        const tid=getThreadId(u.email,s.email);
        if(state.messages[tid]&&state.messages[tid].length)threads.push({other:s,tid,last:state.messages[tid].slice(-1)[0]});
      });
    }
    return threads.sort((a,b)=>(b.last?.ts||0)-(a.last?.ts||0));
  };

  const re=()=>{
    const threads=getMyThreads();
    if(!activeThread&&threads.length)activeThread=threads[0].other.email;

    container.innerHTML=`
    <div style="display:flex;min-height:80vh;background:var(--forest);">
      <div style="width:280px;border-right:1px solid rgba(255,255,255,0.1);overflow-y:auto;">
        <div style="padding:16px;border-bottom:1px solid rgba(255,255,255,0.1);">
          <p style="color:var(--gold);font-size:.78rem;letter-spacing:2px;text-transform:uppercase;">💬 Messagerie</p>
          ${u.role==='etudiant'?`<button class="btn btn-gold btn-sm" style="margin-top:8px;width:100%;" onclick="showNewMsgModal()">+ Nouveau message</button>`:''}
        </div>
        <div id="thread-list">
          ${threads.length?threads.map(t=>`
            <div class="thread-item ${activeThread===t.other.email?'active':''}" onclick="setActiveThread('${t.other.email}')">
              <div style="width:36px;height:36px;background:var(--forest-m);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">${t.other.avatar||'👤'}</div>
              <div style="flex:1;min-width:0;">
                <p style="color:var(--cream);font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(t.other.nom)}</p>
                <p style="color:var(--muted);font-size:.76rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.last?esc(t.last.text.substring(0,30))+'...':'...'}</p>
              </div>
            </div>`).join(''):`<p style="color:var(--muted);padding:20px;font-size:.88rem;text-align:center;">Aucune conversation</p>`}
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;" id="chat-panel">
        ${renderChatPanel(activeThread)}
      </div>
    </div>`;

    window.setActiveThread=function(email){activeThread=email;re();};
  };re();

  window.showNewMsgModal=function(){
    showModal(`
    <h3 style="color:var(--forest);margin-bottom:14px;">💬 Nouvelle conversation</h3>
    <div class="form-group"><label>Choisir un artisan</label>
      <select id="nm-art">${state.artisans.map(a=>`<option value="${esc(a.email)}">${esc(a.nom)} — ${esc(a.spec)}</option>`).join('')}</select>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" style="flex:1;" onclick="startNewMsg()">Ouvrir la conversation →</button>
    </div>`);
  };

  window.startNewMsg=function(){
    const email=document.getElementById('nm-art').value;
    activeThread=email;closeModal();re();
  };
}

function renderChatPanel(otherEmail){
  const u=state.currentUser;
  if(!otherEmail)return`<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);">Sélectionnez une conversation</div>`;
  const other=(u.role==='etudiant'?state.artisans:state.users.filter(x=>x.role==='etudiant')).find(x=>x.email===otherEmail);
  if(!other)return`<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);">Introuvable.</div>`;
  const tid=getThreadId(u.email,other.email);
  const msgs=state.messages[tid]||[];
  return`
  <div style="padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:12px;">
    <div style="width:36px;height:36px;background:var(--forest-m);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">${other.avatar||'👤'}</div>
    <div><p style="color:var(--cream);font-weight:600;">${esc(other.nom)}</p><p style="color:var(--muted);font-size:.78rem;">${esc(other.spec||other.ville||'')}</p></div>
  </div>
  <div class="msg-area" id="msg-area" style="flex:1;border-radius:0;">
    ${msgs.length?msgs.map(m=>`
      <div style="display:flex;flex-direction:column;align-items:${m.from===u.email?'flex-end':'flex-start'};">
        <div class="msg-bubble ${m.from===u.email?'sent':'received'}">${esc(m.text)}</div>
        <span class="msg-meta" style="color:var(--muted);">${fmtDate(m.ts)}</span>
      </div>`).join(''):`<div style="text-align:center;color:var(--muted);margin:auto;">Démarrez la conversation !</div>`}
  </div>
  <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:8px;">
    <input id="msg-inp" placeholder="Écrire un message..." style="flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;border-radius:24px;" onkeypress="if(event.key==='Enter')sendMsg('${other.email}')">
    <button class="btn btn-gold btn-sm" onclick="sendMsg('${other.email}')">Envoyer →</button>
  </div>`;
}

window.sendMsg=function(toEmail){
  const u=state.currentUser;
  const inp=document.getElementById('msg-inp');
  if(!inp||!inp.value.trim())return;
  const text=inp.value.trim();
  const tid=getThreadId(u.email,toEmail);
  if(!state.messages[tid])state.messages[tid]=[];
  state.messages[tid].push({from:u.email,to:toEmail,text,ts:Date.now()});
  saveState();
  const panel=document.getElementById('chat-panel');
  if(panel)panel.innerHTML=renderChatPanel(toEmail);
  const area=document.getElementById('msg-area');
  if(area)area.scrollTop=area.scrollHeight;
};

    const myRdvs=state.rdvs.filter(r=>r.artisanEmail===u.email).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const pending=myRdvs.filter(r=>r.status==='en_attente');

        ${others.length?`<div style="margin-bottom:24px;">
          <h3 style="color:var(--gold-l);margin-bottom:12px;">🔄 Reportés (${others.length})</h3>
          ${others.map(r=>rdvCardArtisan(r)).join('')}
        </div>`:''}
        ${!myRdvs.length?`<div style="background:rgba(255,255,255,0.05);border-radius:var(--radius);padding:50px;text-align:center;color:var(--muted);">Aucun rendez-vous pour l'instant.<br>Les demandes des étudiants apparaîtront ici.</div>`:''}
      </div>
    </div>`;
  };re();

  function rdvCardArtisan(r){
    return`<div class="rdv-card ${r.status==='confirmé'?'confirmed':r.status==='reporté'?'reported':'pending'}" style="background:rgba(255,255,255,0.06);border-color:${r.status==='confirmé'?'var(--sage)':r.status==='reporté'?'var(--gold)':'var(--mint)'};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <div>
          <p style="font-weight:700;color:var(--cream);">🧑‍🎓 ${esc(r.etudiantNom)}</p>
          <p style="font-size:.85rem;color:var(--muted);">📅 ${r.date} à ${r.heure}</p>
          ${r.note?`<p style="font-size:.82rem;color:var(--muted);">📝 "${esc(r.note)}"</p>`:''}
          ${r.newDate?`<p style="font-size:.82rem;color:var(--gold);">📆 Nouveau créneau : ${r.newDate} à ${r.newHeure}</p>`:''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${r.status==='en_attente'?`<button class="btn btn-primary btn-sm" onclick="confirmRdv('${r.id}')">✅ Confirmer</button><button class="btn btn-gold btn-sm" onclick="postponeRdvModal('${r.id}')">🔄 Reporter</button>`:''}
          ${r.status==='confirmé'?`<span style="color:var(--mint);font-weight:600;">✅ Confirmé</span><button class="btn btn-gold btn-sm" onclick="postponeRdvModal('${r.id}')">🔄 Reporter</button>`:''}
          ${r.status==='reporté'?`<span style="color:var(--gold);font-weight:600;">🔄 Reporté</span><button class="btn btn-primary btn-sm" onclick="confirmRdv('${r.id}')">✅ Confirmer quand même</button>`:''}
        </div>
      </div>
    </div>`;
  }

  window.confirmRdv=function(id){
    const rdv=state.rdvs.find(r=>r.id===id);if(!rdv)return;
    rdv.status='confirmé';saveState();showToast('✅ RDV confirmé !');re();
  };
  window.postponeRdvModal=function(id){
    const rdv=state.rdvs.find(r=>r.id===id);if(!rdv)return;
    const today=new Date().toISOString().split('T')[0];
    showModal(`
    <h3 style="color:var(--forest);margin-bottom:14px;">🔄 Reporter le RDV</h3>
    <p style="color:#666;margin-bottom:14px;">Proposer un nouveau créneau à <strong>${esc(rdv.etudiantNom)}</strong></p>
    <div class="form-group"><label>Nouvelle date *</label><input type="date" id="nd" min="${today}" value="${rdv.date}"></div>
    <div class="form-group"><label>Nouvelle heure *</label><input type="time" id="nh" value="${rdv.heure}"></div>
    <div class="form-group"><label>Message (optionnel)</label><textarea id="nm2" rows="2" placeholder="Raison du report..."></textarea></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Annuler</button>
      <button class="btn btn-gold" style="flex:1;" onclick="confirmPostpone('${id}')">Confirmer le report →</button>
    </div>`);
  };
  window.confirmPostpone=function(id){
    const date=document.getElementById('nd').value;
    const heure=document.getElementById('nh').value;
    if(!date||!heure){showToast('⚠️ Date et heure obligatoires.','error');return;}
    const rdv=state.rdvs.find(r=>r.id===id);if(!rdv)return;
    rdv.status='reporté';rdv.newDate=date;rdv.newHeure=heure;
    saveState();closeModal();showToast('🔄 RDV reporté. L\'étudiant en sera informé.');re();
  };
}

function renderCatalogue(container){
  const u=state.currentUser;
  if(!u||u.role!=='artisan'){container.innerHTML='<p style="text-align:center;padding:40px;">Accès réservé aux artisans.</p>';return;}
  const getArt=()=>state.artisans.find(a=>a.email===u.email)||u;
  const re=()=>{
    const art=getArt();
    const articles=art.articles||[];
    container.innerHTML=`
    <div style="background:var(--forest);min-height:100vh;padding:30px 20px;">
      <div style="max-width:900px;margin:0 auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
          <div>
            <h1 style="font-family:'Playfair Display',serif;color:var(--cream);">🗂️ Gérer mon Catalogue</h1>
            <p style="color:var(--muted);">${articles.length} article(s)</p>
          </div>
          <button class="btn btn-gold" onclick="showAddArticleModal()">+ Ajouter un article</button>
        </div>
        ${articles.length?`<div class="grid-3">${articles.map(a=>`
          <div class="creation-card">
            ${a.imageData?`<img src="${a.imageData}" alt="${esc(a.titre)}">`:`<div style="height:150px;background:var(--forest-m);display:flex;align-items:center;justify-content:center;font-size:3rem;">${u.avatar||'🏺'}</div>`}
            <div class="creation-body">
              <h4>${esc(a.titre)}</h4>
              <p style="font-size:.82rem;color:#666;">${esc(a.description)}</p>
              ${a.categorie?`<span class="tag">${esc(a.categorie)}</span>`:''}
              <div style="display:flex;gap:6px;margin-top:10px;">
                <button class="btn btn-outline btn-sm" onclick="editArticleModal('${a.id}')">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteArticle('${a.id}')">🗑</button>
              </div>
            </div>
          </div>`).join('')}</div>`:
          `<div style="background:rgba(255,255,255,0.05);border-radius:var(--radius);padding:50px;text-align:center;color:var(--muted);">Aucun article dans votre catalogue.<br><button class="btn btn-gold btn-sm" style="margin-top:14px;" onclick="showAddArticleModal()">+ Ajouter votre premier article</button></div>`}
      </div>
    </div>`;
  };re();

  window.showAddArticleModal=function(existing=null){
    showModal(`
    <h3 style="color:var(--forest);margin-bottom:14px;">${existing?'✏️ Modifier':'+ Ajouter'} un article</h3>
    <div class="form-group"><label>Titre *</label><input id="at2" value="${existing?esc(existing.titre):''}" placeholder="Ex: Poterie bleue de Fès"></div>
    <div class="form-group"><label>Description</label><textarea id="ad2" rows="3">${existing?esc(existing.description):''}</textarea></div>
    <div class="form-group"><label>Catégorie</label><input id="ac2" value="${existing?esc(existing.categorie):''}" placeholder="Ex: Poterie, Tapis, Bijoux..."></div>
    <div class="form-group"><label>Photo</label><input type="file" id="ai2" accept="image/*"></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Annuler</button>
      <button class="btn btn-gold" style="flex:1;" onclick="saveArticle('${existing?existing.id:''}')">Sauvegarder →</button>
    </div>`);
  };

  window.editArticleModal=function(id){
    const art=getArt();
    const article=(art.articles||[]).find(a=>a.id===id);
    if(!article)return;window.showAddArticleModal(article);
  };

  window.saveArticle=function(existingId){
    const titre=san(document.getElementById('at2').value);
    if(!titre){showToast('⚠️ Titre obligatoire.','error');return;}
    const description=document.getElementById('ad2').value.trim();
    const categorie=san(document.getElementById('ac2').value);
    const fileInp=document.getElementById('ai2');
    const doSave=(img)=>{
      const idx=state.artisans.findIndex(a=>a.email===u.email);
      if(idx<0)return;
      if(!state.artisans[idx].articles)state.artisans[idx].articles=[];
      if(existingId){
        const ai=state.artisans[idx].articles.findIndex(a=>a.id===existingId);
        if(ai>=0){Object.assign(state.artisans[idx].articles[ai],{titre,description,categorie});if(img)state.artisans[idx].articles[ai].imageData=img;}
      }else{
        state.artisans[idx].articles.push({id:'art'+Date.now(),titre,description,categorie,imageData:img||''});
      }
      state.currentUser.articles=state.artisans[idx].articles;
      saveState();closeModal();showToast('✅ Article sauvegardé.');re();
    };
    if(fileInp.files[0])resizeImage(fileInp.files[0],500,img=>doSave(img));
    else doSave(null);
  };

  window.deleteArticle=function(id){
    if(!confirm('Supprimer cet article ?'))return;
    const idx=state.artisans.findIndex(a=>a.email===u.email);
    if(idx>=0)state.artisans[idx].articles=state.artisans[idx].articles.filter(a=>a.id!==id);
    if(state.currentUser.articles)state.currentUser.articles=state.currentUser.articles.filter(a=>a.id!==id);
    saveState();showToast('🗑 Article supprimé.');re();
  };
}

function renderGuide(container){
  if(!state.guideActif){container.innerHTML='<p style="text-align:center;padding:60px;">📖 Guide temporairement indisponible.</p>';return;}
  let activeKey='poterie';
  const animBg=(canvas,c,c2)=>{
    const ctx=canvas.getContext('2d');let angle=0;
    const draw=()=>{
      const w=canvas.width=canvas.parentElement.clientWidth,h=canvas.height=canvas.parentElement.clientHeight;
      ctx.clearRect(0,0,w,h);ctx.save();ctx.translate(w/2,h/2);ctx.rotate(angle*Math.PI/180);
      ctx.strokeStyle=c2+'40';ctx.lineWidth=1.5;
      for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(60*Math.cos(a),60*Math.sin(a));ctx.stroke();}
      ctx.restore();angle+=.3;requestAnimationFrame(draw);
    };draw();
  };
  const renderContent=()=>{
    const g=state.guideData[activeKey];
    const c=container.querySelector('#gc');
    c.innerHTML=`
    <div style="position:relative;background:${g.couleur};color:white;padding:40px;border-radius:var(--radius);margin-bottom:24px;min-height:240px;">
      <canvas id="gCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.5;"></canvas>
      <div style="position:relative;z-index:1;"><span style="font-size:3.5rem;">${g.emoji}</span><h1 style="font-family:'Playfair Display',serif;">${g.nom}</h1></div>
    </div>
    <div class="card"><h3>📜 Histoire & Origines</h3><p style="white-space:pre-line;margin-top:8px;">${g.histoire||''}</p>${g.histoire_suite?`<p style="margin-top:10px;white-space:pre-line;">${g.histoire_suite}</p>`:''}</div>
    <div class="card" style="border-left:4px solid ${g.couleur2};"><h3>🔧 Matières & Techniques</h3><p style="white-space:pre-line;margin-top:8px;">${g.techniques||''}</p></div>
    <div class="card"><h3>🔮 Symbolisme & Décors</h3><p style="white-space:pre-line;margin-top:8px;">${g.symbolisme||''}</p></div>
    <div class="card"><h3>🛡️ Conservation & Entretien</h3><p style="white-space:pre-line;margin-top:8px;">${g.conservation||''}</p></div>
    <div class="card"><h3>⚙️ Outils Traditionnels</h3><div style="margin-top:8px;">${(g.outils||[]).map(o=>`<p style="margin-bottom:6px;"><strong>${o[0]}</strong> — ${o[1]}</p>`).join('')}</div></div>
    <div class="card"><h3>📍 Régions du Maroc</h3><div style="margin-top:8px;">${(g.regions||[]).map(r=>`<p style="margin-bottom:6px;"><strong>${r[0]}</strong> ${r[1]}</p>`).join('')}</div></div>
    <div class="card-gold"><p style="white-space:pre-line;">${g.tawuri||''}</p></div>
    <button class="btn btn-gold" onclick="genPDF('${activeKey}')">📄 Télécharger le guide PDF</button>`;
    const canvas=document.getElementById('gCanvas');if(canvas)animBg(canvas,g.couleur,g.couleur2);
  };
  container.innerHTML=`
  <div style="display:flex;flex-wrap:wrap;min-height:80vh;">
    <div style="background:var(--forest);width:250px;padding:18px 0;color:var(--cream);">
      <p style="padding:0 18px;color:var(--gold);font-size:.76rem;letter-spacing:2px;margin-bottom:6px;">GUIDE TAWURI</p>
      <div class="geometric-line" style="margin:8px 18px;"></div>
      ${Object.keys(ARTISANAT_LABELS).map(key=>`<button class="guide-nav-btn" data-key="${key}">${ARTISANAT_LABELS[key]}</button>`).join('')}
    </div>
    <div id="gc" style="flex:1;min-width:280px;padding:22px;"></div>
  </div>`;
  container.querySelectorAll('.guide-nav-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      activeKey=this.dataset.key;
      container.querySelectorAll('.guide-nav-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');renderContent();
    });
  });
  const first=container.querySelector('.guide-nav-btn');if(first)first.classList.add('active');
  renderContent();
}

window.genPDF=function(key){
  const g=state.guideData[key];if(!g||!window.jspdf)return;
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFontSize(18);doc.text(g.nom,105,20,null,null,'center');
  doc.setFontSize(10);
  const text=(g.histoire||'')+'\n\n'+(g.histoire_suite||'')+'\n\n'+(g.techniques||'')+'\n\n'+(g.symbolisme||'')+'\n\n'+(g.conservation||'');
  const lines=doc.splitTextToSize(text,180);
  doc.text(lines,15,35);doc.save(`Guide_${key}.pdf`);
};

          <div class="form-group"><label>Nom complet</label><input id="an2"></div>
          <div class="form-group"><label>Téléphone</label><input id="atel2"></div>
          <div class="form-group"><label>Ville</label><select id="av2">${VILLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
          <div class="form-group"><label>Adresse</label><input id="aad2"></div>
          <div class="form-group"><label>Spécialité</label><select id="as2">${SPECIALITES.map(s=>`<option>${s}</option>`).join('')}</select></div>
          <div class="form-group"><label>Mot de passe</label><input type="password" id="ap2" value="temp1234"></div>
          <button class="btn btn-primary" onclick="adminAddArtisan()">Créer →</button>`;
        }
      };
      window.adminAddEtudiant=function(){
        const nom=san(document.getElementById('an2').value);
        const email=san(document.getElementById('ae2').value.toLowerCase());
        const ville=document.getElementById('av2').value;
        const pwd=document.getElementById('ap2').value;
        if(!nom||!email||!pwd){showToast('⚠️ Champs manquants.','error');return;}
        state.users.push({nom,email,ville,pwd,role:'etudiant',avatar:'🧑‍🎓',photo:'',dateInscription:Date.now()});
        saveState();showToast('✅ Compte étudiant créé.');re();
      };
      window.adminAddArtisan=function(){
        const nom=san(document.getElementById('an2').value);
        const tel=san(document.getElementById('atel2').value);
        const ville=document.getElementById('av2').value;
        const adresse=san(document.getElementById('aad2').value);
        const spec=document.getElementById('as2').value;
        const pwd=document.getElementById('ap2').value;
        if(!nom||!tel||!pwd){showToast('⚠️ Champs manquants.','error');return;}
        const a={id:'a'+Date.now(),nom,email:tel,tel,ville,adresse,spec,pwd,role:'artisan',avatar:spec.split(' ')[0]||'🏺',photo:'',bio:'',articles:[],cataloguePdf:'',dateInscription:Date.now()};
        state.artisans.push(a);state.users.push(a);
        saveState();showToast('✅ Compte artisan créé.');re();
      };
      window.adminSetAddRole('etudiant');
    }else if(tab==='guide'){
      const keys=Object.keys(state.guideData);
      ac.innerHTML=`
      <div class="card">
        <h3 style="color:var(--forest);margin-bottom:16px;">📖 Gestion du Guide</h3>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
          <span style="color:${state.guideActif?'var(--sage)':'var(--red)'};">Guide : ${state.guideActif?'✅ Actif':'🚫 Désactivé'}</span>
          <button class="btn btn-gold btn-sm" onclick="toggleGuide()">${state.guideActif?'Désactiver':'Activer'} le guide</button>
          <button class="btn btn-primary btn-sm" onclick="showAddDocModal()">➕ Ajouter un document</button>
        </div>
        <h4 style="color:var(--forest);margin-bottom:12px;">Sections disponibles (${keys.length}) :</h4>
        ${keys.map(k=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee;flex-wrap:wrap;gap:8px;">
          <div>
            <span style="font-size:1.2rem;">${state.guideData[k].emoji||'📄'}</span>
            <strong style="margin-left:6px;">${esc(state.guideData[k].nom||k)}</strong>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-sm" style="background:rgba(74,140,92,0.15);color:var(--forest);" onclick="showEditDocModal('${k}')">✏️ Modifier</button>
            <button class="btn btn-danger btn-sm" onclick="deleteGuideDoc('${k}')">🗑 Supprimer</button>
          </div>
        </div>`).join('')}
        ${!keys.length?`<p style="color:#888;text-align:center;padding:20px;">Aucune section dans le guide. Ajoutez-en une !</p>`:''}
      </div>`;

      window.showAddDocModal=function(){
        showModal(`
        <h3 style="color:var(--forest);margin-bottom:16px;">➕ Ajouter un document au guide</h3>
        <div class="form-group"><label>Clé unique (sans espaces) *</label><input id="gk" placeholder="ex: ceramique_moderne"></div>
        <div class="form-group"><label>Emoji</label><input id="ge" placeholder="🏺" maxlength="4"></div>
        <div class="form-group"><label>Nom du document *</label><input id="gn" placeholder="ex: La Céramique Moderne"></div>
        <div class="form-group"><label>Couleur principale (hex)</label><input id="gc2" placeholder="#8B4513" value="#245038"></div>
        <div class="form-group"><label>Histoire / Contenu principal *</label><textarea id="gh" rows="5" placeholder="Décrivez cet artisanat..."></textarea></div>
        <div class="form-group"><label>Techniques</label><textarea id="gt" rows="3" placeholder="Matières et techniques utilisées..."></textarea></div>
        <div class="form-group"><label>Symbolisme</label><textarea id="gs" rows="3" placeholder="Signification des motifs et symboles..."></textarea></div>
        <div class="form-group"><label>Conseil conservation</label><textarea id="gcon" rows="2" placeholder="Comment entretenir les créations..."></textarea></div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Annuler</button>
          <button class="btn btn-primary" style="flex:1;" onclick="saveNewDoc()">Ajouter →</button>
        </div>`);
      };

      window.showEditDocModal=function(key){
        const g=state.guideData[key];if(!g)return;
        showModal(`
        <h3 style="color:var(--forest);margin-bottom:16px;">✏️ Modifier : ${esc(g.nom||key)}</h3>
        <div class="form-group"><label>Emoji</label><input id="ge" value="${esc(g.emoji||'')}" maxlength="4"></div>
        <div class="form-group"><label>Nom du document *</label><input id="gn" value="${esc(g.nom||'')}"></div>
        <div class="form-group"><label>Couleur principale (hex)</label><input id="gc2" value="${esc(g.couleur||'#245038')}"></div>
        <div class="form-group"><label>Histoire / Contenu principal *</label><textarea id="gh" rows="5">${esc(g.histoire||'')}</textarea></div>
        <div class="form-group"><label>Techniques</label><textarea id="gt" rows="3">${esc(g.techniques||'')}</textarea></div>
        <div class="form-group"><label>Symbolisme</label><textarea id="gs" rows="3">${esc(g.symbolisme||'')}</textarea></div>
        <div class="form-group"><label>Conseil conservation</label><textarea id="gcon" rows="2">${esc(g.conservation||'')}</textarea></div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Annuler</button>
          <button class="btn btn-primary" style="flex:1;" onclick="saveEditDoc('${key}')">Sauvegarder →</button>
        </div>`);
      };

      window.saveNewDoc=function(){
        let key=san(document.getElementById('gk').value).replace(/\s+/g,'_').toLowerCase();
        const nom=san(document.getElementById('gn').value);
        if(!key||!nom){showToast('⚠️ Clé et nom obligatoires.','error');return;}
        if(state.guideData[key]){showToast('⚠️ Cette clé existe déjà.','error');return;}
        const emoji=document.getElementById('ge').value.trim()||'📄';
        const couleur=document.getElementById('gc2').value.trim()||'#245038';
        const histoire=document.getElementById('gh').value.trim();
        const techniques=document.getElementById('gt').value.trim();
        const symbolisme=document.getElementById('gs').value.trim();
        const conservation=document.getElementById('gcon').value.trim();
        state.guideData[key]={emoji,nom,couleur,couleur2:couleur,histoire,techniques,symbolisme,conservation,regions:[],tawuri:''};
        saveState();closeModal();showToast('✅ Document ajouté au guide.');re();
      };

      window.saveEditDoc=function(key){
        if(!state.guideData[key])return;
        const nom=san(document.getElementById('gn').value);
        if(!nom){showToast('⚠️ Nom obligatoire.','error');return;}
        state.guideData[key].emoji=document.getElementById('ge').value.trim()||'📄';
        state.guideData[key].nom=nom;
        state.guideData[key].couleur=document.getElementById('gc2').value.trim()||'#245038';
        state.guideData[key].couleur2=state.guideData[key].couleur;
        state.guideData[key].histoire=document.getElementById('gh').value.trim();
        state.guideData[key].techniques=document.getElementById('gt').value.trim();
        state.guideData[key].symbolisme=document.getElementById('gs').value.trim();
        state.guideData[key].conservation=document.getElementById('gcon').value.trim();
        saveState();closeModal();showToast('✅ Document mis à jour.');re();
      };

      window.deleteGuideDoc=function(key){
        if(!confirm(`Supprimer la section "${state.guideData[key]?.nom||key}" du guide ?`))return;
        delete state.guideData[key];
        saveState();showToast('🗑 Section supprimée du guide.');re();
      };
    }else if(tab==='inscriptions'){
      const sortedUsers=[...allUsers].sort((a,b)=>(b.dateInscription||0)-(a.dateInscription||0));
      ac.innerHTML=`
      <div style="background:rgba(255,255,255,0.04);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.1);">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:0;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,0.15);color:var(--gold);font-size:.78rem;font-weight:700;letter-spacing:.5px;">
          <span>NOM</span><span>RÔLE / SPÉCIALITÉ</span><span>CONTACT</span><span>DATE D'INSCRIPTION</span><span>STATUT</span>
        </div>
        ${sortedUsers.length?sortedUsers.map(u=>{
          const st=getStatus(u.email);
          const dateStr=u.dateInscription?fmtDate(u.dateInscription):'—';
          return`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;align-items:center;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:1.3rem;">${u.avatar||'👤'}</span><span style="color:var(--cream);font-weight:600;">${esc(u.nom)}</span></div>
            <span style="color:var(--muted);font-size:.85rem;">${u.role==='artisan'?esc(u.spec):'🧑‍🎓 Étudiant'}</span>
            <span style="color:var(--muted);font-size:.82rem;">${esc(u.email)}</span>
            <span style="color:var(--mint);font-size:.82rem;">📅 ${dateStr}</span>
            <span style="padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:700;background:${st==='Actif'?'rgba(74,140,92,0.2)':st==='Restreint'?'rgba(201,168,76,0.2)':'rgba(248,113,113,0.2)'};color:${st==='Actif'?'var(--mint)':st==='Restreint'?'var(--gold)':'var(--red)'};">${st}</span>
          </div>`;
        }).join(''):`<p style="color:var(--muted);text-align:center;padding:40px;">Aucune inscription pour le moment.</p>`}
      </div>`;
    }else if(tab==='stats'){
      const totalU=state.users.filter(u=>u.role==='etudiant').length;
      const totalA=state.artisans.length;
      const totalRdv=state.rdvs.length;
      const totalEv=state.evaluations.length;
      const totalMsg=Object.values(state.messages).reduce((s,m)=>s+m.length,0);
      ac.innerHTML=`
      <div class="grid-4">
        <div class="stat-card" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
          <div class="stat-icon">🧑‍🎓</div><div class="stat-num">${totalU}</div><div class="stat-label">Étudiants</div>
        </div>
        <div class="stat-card" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
          <div class="stat-icon">🏺</div><div class="stat-num">${totalA}</div><div class="stat-label">Artisans</div>
        </div>
        <div class="stat-card" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
          <div class="stat-icon">📅</div><div class="stat-num">${totalRdv}</div><div class="stat-label">Rendez-vous</div>
        </div>
        <div class="stat-card" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
          <div class="stat-icon">⭐</div><div class="stat-num">${totalEv}</div><div class="stat-label">Évaluations</div>
        </div>
        <div class="stat-card" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
          <div class="stat-icon">💬</div><div class="stat-num">${totalMsg}</div><div class="stat-label">Messages envoyés</div>
        </div>
        <div class="stat-card" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
          <div class="stat-icon">🎨</div><div class="stat-num">${state.creations.length}</div><div class="stat-label">Créations partagées</div>
        </div>
      </div>`;
    }
  };re();

  window.setStatut=function(email,s){
    state.statuts[email]=s;saveState();
    if(state.currentUser&&state.currentUser.email===email&&s==='Bloqué'){doLogout();return;}
    showToast(`✅ Statut mis à jour : ${s}`);re();
  };
  window.deleteUser=function(email){
    if(!confirm('Supprimer définitivement ce compte ?'))return;
    state.users=state.users.filter(u=>u.email!==email);
    state.artisans=state.artisans.filter(a=>a.email!==email);
    saveState();showToast('🗑 Compte supprimé.');re();
  };
  window.toggleGuide=function(){
    state.guideActif=!state.guideActif;saveState();showToast(`Guide ${state.guideActif?'activé':'désactivé'}.`);re();
  };
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
updateNav();
navigate('accueil');
</script>
</body>
